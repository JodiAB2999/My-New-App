<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Shopping App</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛒 Grocery Store</h1>
            <button class="cart-btn" id="cartBtn">
                <span>🛒 Cart</span>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>

        <!-- Search and Filter -->
        <div class="controls">
            <input type="text" class="search-input" id="searchInput" placeholder="Search groceries...">
            <select class="category-filter" id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Produce">🥦 Produce</option>
                <option value="Dairy">🥛 Dairy</option>
                <option value="Meat">🥩 Meat</option>
                <option value="Bakery">🍞 Bakery</option>
                <option value="Pantry">🍯 Pantry</option>
            </select>
        </div>

        <!-- Items Grid -->
        <div class="items-container" id="itemsContainer"></div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Shopping Cart</h2>
                <button class="close-btn" id="closeCartBtn">&times;</button>
            </div>

            <div id="cartItemsContainer" class="cart-items"></div>

            <div class="cart-summary" id="cartSummary" style="display: none;">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (8%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
            </div>

            <div class="cart-actions">
                <button class="btn btn-secondary" id="continueShopping">Continue Shopping</button>
                <button class="btn btn-primary" id="checkoutBtn">Checkout</button>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content checkout-modal">
            <div class="modal-header">
                <h2>Order Confirmation</h2>
                <button class="close-btn" id="closeCheckoutBtn">&times;</button>
            </div>

            <div class="checkout-message">
                <p>✅</p>
                <p>Thank you for your purchase!</p>
                <p style="font-size: 16px; color: var(--gray-color);">Your order has been confirmed.</p>
            </div>

            <div id="orderSummary" class="order-summary"></div>

            <div class="cart-actions">
                <button class="btn btn-primary" id="backToShoppingBtn">Back to Shopping</button>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>

</html>
